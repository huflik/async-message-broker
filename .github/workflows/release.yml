name: Build and Package DEB

on:
  push:
    #tags:
    #  - 'v*'           # Запуск при публикации тега версии (например, v1.0.0)
  workflow_dispatch:   # Возможность ручного запуска

env:
  PACKAGE_NAME: async-message-broker
  DESCRIPTION: "Async Message Broker with guaranteed delivery and Prometheus metrics"
  MAINTAINER: "Your Name <your.email@example.com>"

jobs:
  # ============================================================================
  # Этап 1: Сборка и тестирование
  # ============================================================================
  test:
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04
      
    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            cmake \
            git \
            pkg-config \
            libzmq3-dev \
            libboost-system-dev \
            libsqlite3-dev \
            libspdlog-dev \
            zlib1g-dev \
            libcurl4-openssl-dev \
            libgtest-dev \
            libgmock-dev \
            wget \
            g++ \
            make

      - name: Build and Install GTest and GMock
        run: |
          # Собираем GTest
          cd /usr/src/gtest
          cmake CMakeLists.txt
          make
          cp lib/*.a /usr/lib
          
          # Собираем GMock
          cd /usr/src/gmock
          cmake CMakeLists.txt
          make
          cp lib/*.a /usr/lib
          
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build prometheus-cpp (Static Build)
        run: |
          git clone --recursive https://github.com/jupp0r/prometheus-cpp.git
          cd prometheus-cpp
          git checkout v1.2.4
          git submodule update --init --recursive
          
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DENABLE_TESTING=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DUSE_THIRDPARTY_LIBRARIES=ON \
            -DENABLE_COMPRESSION=ON
          make -j$(nproc)
          make install
          cd ../..
          rm -rf prometheus-cpp

      - name: Configure CMake Project (with Tests)
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DBUILD_EXAMPLES=OFF \
            -DWITH_GTEST=ON
          
      - name: Build Project
        run: |
          cd build
          make -j$(nproc)
          
      - name: Run Tests
        run: |
          cd build
          ctest --output-on-failure --verbose
          
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            build/Testing/
            build/*.log

  # ============================================================================
  # Этап 2: Сборка DEB пакета (только если тесты прошли)
  # ============================================================================
  package:
    needs: test  # Зависит от успешного выполнения тестов
    runs-on: ubuntu-22.04
    container:
      image: ubuntu:22.04
      
    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            cmake \
            git \
            pkg-config \
            libzmq3-dev \
            libboost-system-dev \
            libsqlite3-dev \
            libspdlog-dev \
            zlib1g-dev \
            libcurl4-openssl-dev \
            wget \
            ruby \
            ruby-dev \
            rubygems \
            g++ \
            make \
            file

      - name: Install fpm (Package Builder)
        run: gem install fpm
          
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build prometheus-cpp (Static Build)
        run: |
          git clone --recursive https://github.com/jupp0r/prometheus-cpp.git
          cd prometheus-cpp
          git checkout v1.2.4
          git submodule update --init --recursive
          
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DENABLE_TESTING=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DUSE_THIRDPARTY_LIBRARIES=ON \
            -DENABLE_COMPRESSION=ON
          make -j$(nproc)
          make install
          cd ../..
          rm -rf prometheus-cpp

      - name: Configure CMake Project (Release, No Tests)
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc" \
            -DBUILD_EXAMPLES=OFF \
            -DWITH_GTEST=OFF
          
      - name: Build Project
        run: |
          cd build
          make -j$(nproc)
          
      - name: Strip Binary (Reduce Size)
        run: |
          strip build/broker
          
      - name: Prepare Package Directory
        run: |
          cd build
          make install DESTDIR=../pkg-dir
          cd ..
          
          mkdir -p pkg-dir/lib/systemd/system
          mkdir -p pkg-dir/usr/share/doc/${PACKAGE_NAME}
          mkdir -p pkg-dir/DEBIAN
          
          cp README.md pkg-dir/usr/share/doc/${PACKAGE_NAME}/ || true

      - name: Create systemd service file
        run: |
          cat > pkg-dir/lib/systemd/system/${PACKAGE_NAME}.service << 'EOF'
          [Unit]
          Description=Async Message Broker with guaranteed delivery and Prometheus metrics
          After=network.target
          
          [Service]
          Type=simple
          User=broker
          Group=broker
          ExecStart=/usr/bin/broker --port 5555 --db-path /var/lib/broker/broker.db
          Restart=on-failure
          RestartSec=5
          
          NoNewPrivileges=yes
          PrivateTmp=yes
          ProtectSystem=full
          ProtectHome=yes
          
          RuntimeDirectory=broker
          StateDirectory=broker
          
          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Create postinst script
        run: |
          cat > pkg-dir/DEBIAN/postinst << 'EOF'
          #!/bin/sh
          set -e
          if [ "$1" = "configure" ]; then
              if ! getent passwd broker > /dev/null; then
                  useradd --system --user-group --no-create-home --shell /usr/sbin/nologin broker
              fi
              chown -R broker:broker /var/lib/broker
              chmod 750 /var/lib/broker
              systemctl daemon-reload
              systemctl enable async-message-broker.service
          fi
          EOF
          chmod 755 pkg-dir/DEBIAN/postinst

      - name: Create prerm script
        run: |
          cat > pkg-dir/DEBIAN/prerm << 'EOF'
          #!/bin/sh
          set -e
          if [ "$1" = "remove" ]; then
              systemctl stop async-message-broker.service || true
              systemctl disable async-message-broker.service || true
          fi
          EOF
          chmod 755 pkg-dir/DEBIAN/prerm

      - name: Get Version from Tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version set to: $VERSION"

      - name: Build DEB Package with fpm
        run: |
          fpm \
            -s dir \
            -t deb \
            -n "${PACKAGE_NAME}" \
            -v "${VERSION}" \
            --iteration "1" \
            --license "MIT" \
            --vendor "Your Organization" \
            --maintainer "${MAINTAINER}" \
            --description "${DESCRIPTION}" \
            --url "https://github.com/${GITHUB_REPOSITORY}" \
            --deb-no-default-config-files \
            --depends "libzmq5" \
            --depends "libboost-system1.74.0" \
            --depends "libsqlite3-0" \
            --depends "libstdc++6" \
            --depends "libc6" \
            -C ./pkg-dir \
            .

      - name: Upload DEB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-deb-package
          path: ./*.deb

      - name: Release DEB Package
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
