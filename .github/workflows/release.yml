name: Build and Package DEB

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            pkg-config \
            libzmq3-dev \
            libboost-system-dev \
            libsqlite3-dev \
            libspdlog-dev \
            zlib1g-dev \
            libcurl4-openssl-dev
      
      - name: Build prometheus-cpp
        run: |
          git clone --recursive https://github.com/jupp0r/prometheus-cpp.git
          cd prometheus-cpp
          git checkout v1.2.4
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DENABLE_TESTING=OFF \
            -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          sudo make install
          cd ../..
      
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DWITH_GTEST=OFF \
            -DBUILD_EXAMPLES=ON
      
      - name: Build project
        run: cmake --build build --config Release -j $(nproc)
      
      - name: Debug - List built files
        run: |
          echo "=== Looking for broker ==="
          find build -name "broker" -type f 2>/dev/null || echo "broker not found"
          echo "=== Looking for universal_client ==="
          find build -name "universal_client" -type f 2>/dev/null || echo "universal_client not found"
          echo "=== Full build directory structure ==="
          ls -la build/
          if [ -d "build/examples" ]; then
            ls -la build/examples/
          fi
      
      - name: Create DEB package structure
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/usr/share/doc/async-message-broker
          
          # Копируем бинарник брокера
          if [ -f "build/broker" ]; then
            cp build/broker pkg/usr/bin/
            echo "broker copied from build/broker"
          elif [ -f "build/src/broker" ]; then
            cp build/src/broker pkg/usr/bin/
            echo "broker copied from build/src/broker"
          else
            echo "ERROR: broker executable not found!"
            exit 1
          fi
          
          # Копируем universal_client (ищем везде)
          if [ -f "build/universal_client" ]; then
            cp build/universal_client pkg/usr/bin/
            echo "universal_client copied from build/universal_client"
          elif [ -f "build/examples/universal_client" ]; then
            cp build/examples/universal_client pkg/usr/bin/
            echo "universal_client copied from build/examples/universal_client"
          elif [ -f "universal_client" ]; then
            cp universal_client pkg/usr/bin/
            echo "universal_client copied from root"
          else
            echo "WARNING: universal_client not found, building without it"
          fi
          
          # Копируем README если есть
          if [ -f "README.md" ]; then
            cp README.md pkg/usr/share/doc/async-message-broker/
          fi
          
          # Создаем control файл
          cat > pkg/DEBIAN/control << EOF
          Package: async-message-broker
          Version: 1.0.${{ github.run_number }}
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: libzmq5, libboost-system1.74.0, libsqlite3-0, libstdc++6, libc6
          Maintainer: Your Name <your.email@example.com>
          Description: Async Message Broker with guaranteed delivery
           High-performance message broker with ZeroMQ transport,
           SQLite persistence, and Prometheus metrics support.
           Run with: broker --port 5555 --db-path /path/to/db
          EOF
          
          # Создаем postinst скрипт
          cat > pkg/DEBIAN/postinst << 'EOF'
          #!/bin/sh
          set -e
          mkdir -p /var/lib/async-message-broker
          chmod 755 /var/lib/async-message-broker
          echo ""
          echo "=== Async Message Broker installed ==="
          echo "Run: broker --help"
          echo "Example: broker --port 5555 --db-path /var/lib/async-message-broker/broker.db"
          if [ -f /usr/bin/universal_client ]; then
            echo ""
            echo "=== Universal Client ==="
            echo "Run: universal_client tcp://localhost:5555 <client_name>"
            echo "Example: universal_client tcp://localhost:5555 alice"
          fi
          echo ""
          EOF
          chmod 755 pkg/DEBIAN/postinst
      
      - name: Build DEB package
        run: |
          dpkg-deb --build pkg
          mv pkg.deb async-message-broker-${{ github.run_number }}.deb
          echo "=== DEB package created ==="
          ls -la *.deb
          dpkg --info *.deb
      
      - name: Create Release
        if: github.event_name == 'push'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.${{ github.run_number }}
          release_name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        if: steps.create_release.outputs.id != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./async-message-broker-${{ github.run_number }}.deb
          asset_name: async-message-broker.deb
          asset_content_type: application/vnd.debian.binary-package
