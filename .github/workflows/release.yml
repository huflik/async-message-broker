name: Build and Package DEB

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            pkg-config \
            libzmq3-dev \
            libboost-system-dev \
            libsqlite3-dev \
            libspdlog-dev \
            zlib1g-dev \
            libcurl4-openssl-dev
      
      - name: Build prometheus-cpp
        run: |
          git clone --recursive https://github.com/jupp0r/prometheus-cpp.git
          cd prometheus-cpp
          git checkout v1.2.4
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DENABLE_TESTING=OFF \
            -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          sudo make install
          cd ../..
      
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DWITH_GTEST=OFF \
            -DBUILD_EXAMPLES=ON
      
      - name: Build project
        run: cmake --build build --config Release -j $(nproc)
      
      - name: Create DEB package structure
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          
          # Проверяем и копируем broker
          if [ -f "build/broker" ]; then
            cp build/broker pkg/usr/bin/
            echo "broker copied"
          elif [ -f "build/src/broker" ]; then
            cp build/src/broker pkg/usr/bin/
            echo "broker copied from src"
          else
            echo "ERROR: broker not found!"
            find build -name "broker" -type f
            exit 1
          fi
          
          # Копируем universal_client если есть
          if [ -f "build/universal_client" ]; then
            cp build/universal_client pkg/usr/bin/
            echo "universal_client copied"
          elif [ -f "build/examples/universal_client" ]; then
            cp build/examples/universal_client pkg/usr/bin/
            echo "universal_client copied from examples"
          fi
          
          # Создаем control файл
          cat > pkg/DEBIAN/control << EOF
          Package: async-message-broker
          Version: 1.0.${{ github.run_number }}
          Section: net
          Priority: optional
          Architecture: amd64
          Maintainer: GitHub Actions <actions@github.com>
          Depends: libzmq5, libboost-system-dev, libsqlite3-0, libstdc++6, libc6
          Description: Async Message Broker with guaranteed delivery
           High-performance message broker with ZeroMQ transport,
           SQLite persistence, and Prometheus metrics support.
           Run with: broker --port 5555 --db-path /path/to/db
          EOF
          
          # Создаем postinst скрипт
          cat > pkg/DEBIAN/postinst << 'EOF'
          #!/bin/sh
          set -e
          mkdir -p /var/lib/async-message-broker
          chmod 755 /var/lib/async-message-broker
          echo ""
          echo "=== Async Message Broker installed ==="
          echo "Run: broker --help"
          echo "Example: broker --port 5555 --db-path /var/lib/async-message-broker/broker.db"
          if [ -f /usr/bin/universal_client ]; then
            echo ""
            echo "=== Universal Client ==="
            echo "Run: universal_client tcp://localhost:5555 <client_name>"
          fi
          echo ""
          EOF
          chmod 755 pkg/DEBIAN/postinst
      
      - name: Build DEB package
        run: |
          dpkg-deb --build pkg
          mv pkg.deb async-message-broker-${{ github.run_number }}.deb
          echo "DEB_NAME=async-message-broker-${{ github.run_number }}.deb" >> $GITHUB_ENV
          echo "=== DEB package created ==="
          ls -la *.deb
          file async-message-broker-${{ github.run_number }}.deb
      
      - name: Upload DEB as artifact
        uses: actions/upload-artifact@v4
        with:
          name: async-message-broker-deb
          path: ${{ env.DEB_NAME }}
      
      - name: Create Release and Upload
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          body: |
            ## Automated Build
            
            ✅ Build completed successfully
            - Build number: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            
            ### Installation
            ```bash
            sudo dpkg -i async-message-broker-${{ github.run_number }}.deb
            broker --help
