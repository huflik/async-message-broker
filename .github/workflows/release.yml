name: Build and Package DEB

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            pkg-config \
            libzmq3-dev \
            libboost-system-dev \
            libsqlite3-dev \
            libspdlog-dev \
            zlib1g-dev \
            libcurl4-openssl-dev
      
      - name: Build prometheus-cpp
        run: |
          git clone --recursive https://github.com/jupp0r/prometheus-cpp.git
          cd prometheus-cpp
          git checkout v1.2.4
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DENABLE_TESTING=OFF \
            -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc)
          sudo make install
          cd ../..
      
      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DWITH_GTEST=OFF \
            -DBUILD_EXAMPLES=OFF
      
      - name: Build project
        run: cmake --build build --config Release -j $(nproc)
      
      - name: Debug - List build directory
        run: |
          echo "=== Build directory contents ==="
          ls -la build/
          echo "=== Looking for broker executable ==="
          find build -name "broker" -type f -executable 2>/dev/null || echo "broker not found"
          find build -name "*.deb" 2>/dev/null || echo "No deb files"
      
      - name: Create DEB package structure
        run: |
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/bin
          mkdir -p pkg/lib/systemd/system
          
          # Ищем бинарник в разных возможных местах
          if [ -f "build/broker" ]; then
            cp build/broker pkg/usr/bin/
          elif [ -f "build/src/broker" ]; then
            cp build/src/broker pkg/usr/bin/
          else
            echo "ERROR: broker executable not found!"
            find build -name "broker" -type f
            exit 1
          fi
          
          # Создаем control файл
          cat > pkg/DEBIAN/control << EOF
          Package: async-message-broker
          Version: 1.0.${{ github.run_number }}
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: libzmq5, libboost-system1.74.0, libsqlite3-0, libstdc++6, libc6
          Maintainer: Your Name <your.email@example.com>
          Description: Async Message Broker with guaranteed delivery
           High-performance message broker with ZeroMQ transport,
           SQLite persistence, and Prometheus metrics support.
          EOF
          
          # Создаем systemd service
          cat > pkg/lib/systemd/system/async-message-broker.service << EOF
          [Unit]
          Description=Async Message Broker
          After=network.target
          
          [Service]
          Type=simple
          ExecStart=/usr/bin/broker
          Restart=on-failure
          
          [Install]
          WantedBy=multi-user.target
          EOF
      
      - name: Build DEB package
        run: |
          dpkg-deb --build pkg
          mv pkg.deb async-message-broker-${{ github.run_number }}.deb
          echo "=== DEB package created ==="
          ls -la *.deb
      
      - name: Create Release
        if: github.event_name == 'push'
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.${{ github.run_number }}
          release_name: Release v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
      
      - name: Upload Release Asset
        if: steps.create_release.outputs.id != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./async-message-broker-${{ github.run_number }}.deb
          asset_name: async-message-broker.deb
          asset_content_type: application/vnd.debian.binary-package
